<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級社會：清領時期臺灣的發展（綜合測驗）</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .section-title {
            background: var(--bg-secondary);
            padding: 15px;
            border-left: 6px solid var(--accent-primary);
            margin: 30px 0 20px 0;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: 800;
        }
        .question-block {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }
        .options li {
            list-style: none;
            margin: 10px 0;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .options label:hover {
            border-color: var(--accent-primary);
            background: var(--bg-secondary);
        }
        .input-inline {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: 6px;
            font-family: inherit;
        }
        .correct { color: var(--accent-success); font-weight: bold; }
        .wrong { color: var(--accent-danger); font-weight: bold; }
        .feedback {
            font-size: 0.95rem;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            display: none;
            border-left: 4px solid var(--accent-primary);
        }
        #result {
            display: none;
            margin-top: 40px;
            padding: 30px;
            border-radius: 20px;
            background: var(--glass-bg);
            border: 2px solid var(--accent-primary);
        }
        #scoreText {
            font-size: 2rem;
            text-align: center;
            font-weight: 800;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()"><span>🌙</span> 暗色模式</button>
</div>

<div class="container">
    <p><a href="science.html" style="text-decoration: none; color: var(--accent-primary); font-weight: bold;">⬅ 返回科學索引（社會內容）</a></p>
    <h1>🏛️ 臺灣歷史：清領時期的發展與變遷</h1>
    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">(本測驗根據「社會小五」課綱編寫，用於跨學科練習)</p>
    
    <div class="info-section" style="display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 2px solid var(--border-color); padding-bottom: 15px;">
        <span>班級：<input type="text" class="input-inline" size="5"></span>
        <span>座號：<input type="text" class="input-inline" size="3"></span>
        <span>姓名：<input type="text" class="input-inline" size="8"></span>
    </div>

    <form id="quizForm">
        <div class="section-title">一、社會發展與建設 (選擇題)</div>
        <div class="question-block" id="mc_0">
            <p><strong>1. 清領初期，漢人橫渡臺灣海峽（黑水溝）來臺時，主要面臨的挑戰與限制不包括？</strong></p>
            <ul class="options">
                <li><label><input type="radio" name="mc_0" value="0"> <span>A. 海象凶險，常有船難</span></label></li>
                <li><label><input type="radio" name="mc_0" value="1"> <span>B. 清廷實施「渡臺禁令」</span></label></li>
                <li><label><input type="radio" name="mc_0" value="2"> <span>C. 臺灣島內缺乏任何耕地</span></label></li>
                <li><label><input type="radio" name="mc_0" value="3"> <span>D. 到達後常因地緣或利益發生「械鬥」</span></label></li>
            </ul>
        </div>

        <div class="question-block" id="mc_1">
            <p><strong>2. 臺灣清領時期的「一府二鹿三艋舺」，其中「二鹿」指的是現在的？</strong></p>
            <ul class="options">
                <li><label><input type="radio" name="mc_1" value="0"> <span>A. 臺南安平</span></label></li>
                <li><label><input type="radio" name="mc_1" value="1"> <span>B. 彰化鹿港</span></label></li>
                <li><label><input type="radio" name="mc_1" value="2"> <span>C. 臺北萬華</span></label></li>
                <li><label><input type="radio" name="mc_1" value="3"> <span>D. 屏東東港</span></label></li>
            </ul>
        </div>

        <div class="section-title">二、基礎是非題 (共 20 分)</div>
        <div id="tfContainer"></div>

        <div class="section-title">三、近代化建設 (填空題)</div>
        <div class="question-block">
            <p><strong>請填入正確的歷史人物（沈葆楨 / 劉銘傳）：</strong></p>
            <p>1. 牡丹社事件後，來臺加強防護、興建「億載金城」的官員是：<input type="text" id="blank_1" class="input-inline" size="10"></p>
            <p style="margin-top: 15px;">2. 臺灣首任巡撫，建設鐵路、郵政、電報，推行現代化事務的官員是：<input type="text" id="blank_2" class="input-inline" size="10"></p>
        </div>

        <button type="button" id="submitBtn" onclick="submitQuiz()" style="background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary)); color: white; padding: 15px; border-radius: 12px; border: none; width: 100%; font-size: 1.2rem; font-weight: 700; cursor: pointer; margin-top: 20px;">提交測驗</button>
    </form>

    <div id="result">
        <h2 id="resultScore" style="text-align: center; font-size: 2.5rem; color: var(--accent-primary);"></h2>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'science_unit2_quiz2_society_results';

    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeBtn');
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        btn.innerHTML = newTheme === 'dark' ? '☀️ 亮色模式' : '🌙 暗色模式';
        localStorage.setItem('theme', newTheme);
    }

    const tfQuestions = [
        "1860年臺灣開港通商後，茶葉、樟腦、蔗糖成為主要出口大宗。",
        "「八堡圳」主要是為了灌溉臺北地區所興建的水利工程。",
        "傳教士馬偕博士曾在淡水創辦醫館（滬尾醫館）與牛津學堂。",
        "清領時期，臺灣唯一的教育場所是政府設立的現代化大學。",
        "清法戰爭後，清廷體認臺灣地位重要，於是在1885年宣佈臺灣建省。"
    ];
    const tfAnswers = ["O", "X", "O", "X", "O"];
    const tfFeedback = ["", "八堡圳位於彰化，灌溉彰化平原。", "", "當時主要為私塾與書院，劉銘傳才開始設立新式學堂。", ""];

    const tfContainer = document.getElementById('tfContainer');
    tfQuestions.forEach((q, i) => {
        tfContainer.innerHTML += `
            <div class="question-block" id="tf_div_${i}">
                <p><strong>${i+1}. ${q}</strong></p> 
                <div style="margin-top: 10px;">
                    <select id="tf_${i}" class="input-inline"><option value="">選取</option><option value="O">O</option><option value="X">X</option></select>
                </div>
            </div>`;
    });

    function submitQuiz() {
        let score = 0;
        
        // MC
        if(document.querySelector('input[name="mc_0"]:checked')?.value === "2") score += 15;
        if(document.querySelector('input[name="mc_1"]:checked')?.value === "1") score += 15;

        // TF (5题, 每题10分 = 50)
        tfAnswers.forEach((ans, i) => {
            if(document.getElementById('tf_'+i).value === ans) score += 10;
        });

        // Blanks (2题, 每题10分 = 20)
        if(document.getElementById('blank_1').value.trim().includes("沈葆楨")) score += 10;
        if(document.getElementById('blank_2').value.trim().includes("劉銘傳")) score += 10;

        document.getElementById('result').style.display = 'block';
        document.getElementById('resultScore').innerHTML = `得分：${score} / 100`;
        window.scrollTo({ top: document.getElementById('result').offsetTop - 100, behavior: 'smooth' });
        
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        history.push({ date: new Date().toLocaleString(), score: score });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    });
</script>

</body>
</html>
