<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW QUIZ TITLE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()"><span>🌙</span> 暗色模式</button>
</div>

<div class="container">
    <p><a href="science.html" style="text-decoration: none; font-weight: bold; color: var(--accent-primary);">⬅ 返回目錄</a></p>
    <h1>NEW QUIZ HEADING</h1>
    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button id="submitBtn" type="button" onclick="calculateScore()">提交答案查看結果</button>
    </form>

    <div id="result">
        <h2>測試結果</h2>
        <p id="scoreText" style="font-size: 1.5em;"></p>
        <div id="wrongAnswers"></div>
    </div>

    <div class="history-section">
        <h3>📊 測驗紀錄回顧 (教師專用)</h3>
        <div id="historyList">尚無測驗紀錄</div>
        <button onclick="clearHistory()" style="margin-top: 20px; background: var(--accent-danger); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600;">清除所有紀錄</button>
    </div>
</div>

<script>
    // Unique storage key for this specific quiz
    const STORAGE_KEY = 'CHANGE_ME_results';

    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeBtn');
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        btn.innerHTML = newTheme === 'dark' ? '<span>☀️</span> 亮色模式' : '<span>🌙</span> 暗色模式';
        localStorage.setItem('theme', newTheme);
    }

    const quizData = [
        { q: "Example Question 1?", a: ["Option 1", "Option 2", "Option 3", "Option 4"], correct: 0 },
        { q: "Example Question 2?", a: ["Option 1", "Option 2", "Option 3", "Option 4"], correct: 1 }
    ];

    const container = document.getElementById('questionsContainer');
    quizData.forEach((data, index) => {
        let html = `<div class="question"><p><strong>$\{index + 1\}. $\{data.q\}</strong></p><ul class="options">`;
        data.a.forEach((opt, i) => {
            html += `<li><label><input type="radio" name="q$\{index\}" value="$\{i\}"> <span>$\{opt\}</span></label></li>`;
        });
        html += `</ul></div>`;
        container.innerHTML += html;
    });

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const listContainer = document.getElementById('historyList');
        if (history.length === 0) { listContainer.innerHTML = "尚無測驗紀錄"; return; }
        listContainer.innerHTML = history.slice().reverse().map((item, idx) => `
            <div class="history-item">
                <strong>第 $\{history.length - idx\} 次測驗 - $\{item.date\}</strong><br>
                得分：<span style="color: var(--accent-success); font-weight: bold;">$\{item.score\} / $\{item.total\}</span>
                <details style="margin-top: 10px;"><summary style="cursor: pointer; color: var(--accent-primary); font-weight: 600;">查看錯題細節</summary>
                    <div style="margin-top: 10px;">
                        $\{item.mistakes.length > 0 ? item.mistakes.map(m => \`
                            <p style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px;">
                                <strong>問：</strong>$\{m.question\}<br>
                                <span style="color: var(--accent-danger); font-weight: 600;">答：$\{m.userAnswer\}</span> | <span style="color: var(--accent-success); font-weight: 600;">正：$\{m.correctAnswer\}</span>
                            </p>\`).join('') : "全部正確！"\}
                    </div>
                </details>
            </div>\`).join('');
    }

    function calculateScore() {
        let score = 0;
        let mistakes = [];
        quizData.forEach((data, index) => {
            const selected = document.querySelector(\`input[name="q$\{index\}"]:checked\`);
            if (selected && parseInt(selected.value) === data.correct) {
                score++;
            } else {
                mistakes.push({
                    question: data.q,
                    userAnswer: selected ? data.a[selected.value] : "未作答",
                    correctAnswer: data.a[data.correct]
                });
            }
        });

        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        history.push({ 
            date: new Date().toLocaleString(), 
            score: score, 
            total: quizData.length, 
            mistakes: mistakes 
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

        document.getElementById('result').style.display = 'block';
        document.getElementById('scoreText').innerHTML = \`得分：<strong>$\{score\}</strong> / $\{quizData.length\}\`;
        displayHistory();
        window.scrollTo({ top: document.getElementById('result').offsetTop, behavior: 'smooth' });
    }

    function clearHistory() { if(confirm("確定要清除本測驗的所有歷史紀錄嗎？")) { localStorage.removeItem(STORAGE_KEY); displayHistory(); } }

    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeBtn');
        if (savedTheme === 'dark') btn.innerHTML = '<span>☀️</span> 亮色模式';
        displayHistory();
    });
</script>
</body>
</html>
