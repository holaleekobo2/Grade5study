<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 8 Vocabulary Study List</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .vocab-table-container {
            overflow-x: auto;
            border-radius: 16px;
            margin-top: 2rem;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
        }

        th {
            background-color: var(--accent-primary);
            color: white;
            text-align: left;
            padding: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            position: sticky;
            top: 0;
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 1px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Inter', sans-serif;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: rgba(99, 102, 241, 0.05);
        }

        .word-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 1.1rem;
        }

        .audio-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.1s, border-color 0.2s;
        }

        .audio-btn svg {
            fill: var(--accent-primary);
        }

        .audio-btn:hover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.08);
        }

        .audio-btn:active {
            transform: scale(0.88);
        }

        .chinese {
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .example {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            .example { display: none; }
        }
    </style>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            btn.innerHTML = newTheme === 'dark' ? '<span>☀️</span> 亮色模式' : '<span>🌙</span> 暗色模式';
            localStorage.setItem('theme', newTheme);
        }

        window.addEventListener('DOMContentLoaded', function () {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            const btn = document.getElementById('themeBtn');
            if (saved === 'dark') btn.innerHTML = '<span>☀️</span> 亮色模式';
        });
    </script>
</head>
<body>

<div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()"><span>🌙</span> 暗色模式</button>
</div>

<div class="container">
    <p><a href="english.html" style="text-decoration: none; font-weight: bold; color: var(--accent-primary);">⬅ 返回目錄</a></p>
    <h1>📖 Unit 8 Vocabulary Study List</h1>

    <div class="vocab-table-container">
        <table>
            <thead>
                <tr>
                    <th>Word</th>
                    <th>Chinese Translation</th>
                    <th>Example Usage</th>
                </tr>
            </thead>
            <tbody id="vocab-body">
                <!-- Injected by JS -->
            </tbody>
        </table>
    </div>

    <p style="margin-top: 2rem;"><a href="english.html" style="text-decoration: none; font-weight: bold; color: var(--accent-primary);">⬅ 返回目錄</a></p>
</div>

<script>
    const vocabulary = [
        ["concert",       "音樂會",           "We went to a pop concert."],
        ["neatly",        "整潔地",           "She writes her name neatly."],
        ["quietly",       "安靜地",           "Please talk quietly in the library."],
        ["patiently",     "耐心地",           "The doctor listened patiently."],
        ["carefully",     "小心地",           "Carry the eggs carefully."],
        ["loudly",        "大聲地",           "The baby cried loudly."],
        ["clearly",       "清楚地",           "I can see the sign clearly."],
        ["clap",          "拍手",             "Everyone began to clap."],
        ["noise",         "噪音",             "Stop making so much noise!"],
        ["way",           "方式 / 道路",      "I like the way you smile."],
        ["event",         "事件 / 活動",      "The Olympics is a big event."],
        ["have to",       "必須",             "I have to finish my homework."],
        ["safari",        "野生動物觀賞之旅", "We saw lions on safari."],
        ["rhino",         "犀牛",             "The rhino has a big horn."],
        ["probably",      "大概",             "It will probably rain today."],
        ["grass",         "草",               "The grass is green and soft."],
        ["permission",    "許可",             "Ask for permission first."],
        ["example",       "例子",             "Can you give me an example?"],
        ["comfortably",   "舒服地",           "He sat comfortably on the sofa."],
        ["dream",         "夢 / 夢想",        "I had a strange dream."],
        ["happen",        "發生",             "What happened to your leg?"],
        ["finish",        "完成",             "Did you finish your lunch?"],
        ["wake up",       "醒來",             "I wake up at seven o'clock."],
        ["doorbell",      "門鈴",             "I heard the doorbell ring."],
        ["rule",          "規則",             "Follow the classroom rules."],
        ["bite",          "咬",               "Don't let the dog bite you."],
        ["chase",         "追逐",             "The cat likes to chase mice."],
        ["dark",          "黑暗的",           "It gets dark very early."],
        ["litter",        "亂丟垃圾",         "Don't litter in the park."],
        ["lost",          "迷路",             "We got lost in the city."],
        ["kick",          "踢",               "He can kick the ball far."],
        ["smash",         "打破 / 粉碎",      "Don't smash the window."],
        ["awake",         "醒著的",           "I was awake all night."],
        ["flashlight",    "手電筒",           "Use a flashlight in the dark."],
        ["should",        "應該",             "You should eat more fruit."],
        ["might",         "可能",             "We might go to the zoo."],
        ["follow",        "跟隨 / 遵守",      "Follow the leader."],
        ["advice",        "建議",             "Thank you for your advice."],
        ["female",        "女性 / 雌性的",    "The female lion hunts."],
        ["marathon",      "馬拉松",           "He ran a full marathon."],
        ["silver",        "銀色的",           "She won a silver medal."],
        ["gold",          "金色的",           "Gold is very expensive."],
        ["medal",         "獎牌",             "He wore his gold medal."],
        ["championship",  "冠軍賽",           "Our team won the championship."],
        ["reportedly",    "據報導",           "He is reportedly very rich."],
        ["hobby",         "愛好",             "My hobby is painting."],
        ["rating",        "評價 / 等級",      "The movie has a high rating."],
        ["athlete",       "運動員",           "She is a talented athlete."]
    ];

    const tbody = document.getElementById('vocab-body');

    vocabulary.forEach(([word, trans, ex]) => {
        const tr = document.createElement('tr');
        // Escape single quotes in word for the onclick attribute
        const safeWord = word.replace(/'/g, "\\'");
        tr.innerHTML = `
            <td>
                <div class="word-cell">
                    <button class="audio-btn" onclick="speak('${safeWord}')" title="Pronounce '${word}'">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </button>
                    ${word}
                </div>
            </td>
            <td class="chinese">${trans}</td>
            <td class="example">${ex}</td>
        `;
        tbody.appendChild(tr);
    });

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'en-US';
        msg.rate = 0.85;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
