                    <div class="options">
                        <label><input type="radio" name="tf${i}" value="T"> 正確 (○)</label>
                        <label><input type="radio" name="tf${i}" value="F"> 錯誤 (╳)</label>
                    </div>
                </div>`;
        });

        const mcArea = document.getElementById('mcContainer');
        mcQuestions.forEach((q, i) => {
            let opts = q.options.map((opt, idx) => `
                <label><input type="radio" name="mc${i}" value="${idx}"> ${idx+1}. ${opt}</label>
            `).join('');
            mcArea.innerHTML += `
                <div class="question-block">
                    <span class="question-title">${i + 1}. ${q.q}</span>
                    <div class="options">${opts}</div>
                </div>`;
        });
    }

    function submitQuiz() {
        let totalScore = 0;
        let reviewHtml = '<h2>💡 錯題解析與加強學習</h2>';
        let wrongCount = 0;
        let mistakes = [];

        tfQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="tf${i}"]:checked`);
            const userAns = selected ? selected.value : null;
            if (userAns === item.a) {
                totalScore += 2;
            } else {
                wrongCount++;
                const userDisplay = userAns === "T" ? "○" : (userAns === "F" ? "╳" : "未選");
                const correctDisplay = item.a === "T" ? "○" : "╳";
                reviewHtml += createReviewItem(i+1, "是非題", item.q, userDisplay, correctDisplay, item.ex);
                mistakes.push({ question: item.q, user: userDisplay, correct: correctDisplay });
            }
        });

        mcQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="mc${i}"]:checked`);
            const userAns = selected ? parseInt(selected.value) : null;
            if (userAns === item.a) {
                totalScore += 2;
            } else {
                wrongCount++;
                const userDisplay = userAns === null ? "未選" : item.options[userAns];
                const correctDisplay = item.options[item.a];
                reviewHtml += createReviewItem(i+1, "選擇題", item.q, userDisplay, correctDisplay, item.ex);
                mistakes.push({ question: item.q, user: userDisplay, correct: correctDisplay });
            }
        });

        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        history.push({
            date: new Date().toLocaleString(),
            score: totalScore,
            total: 100,
            mistakes: mistakes
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

        const scoreArea = document.getElementById('scoreText');
        scoreArea.innerHTML = `得分：${totalScore} / 100`;
        
        const reviewArea = document.getElementById('reviewArea');
        reviewArea.innerHTML = wrongCount > 0 ? reviewHtml : '<div style="color:#27ae60; text-align:center;"><h3>完美！你對清代台灣史瞭若指掌！</h3><img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3h6Zzh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l0Exk8nx5Z8S92A8g/giphy.gif" width="200"></div>';
        
        document.getElementById('result').style.display = 'block';
        displayHistory();
        window.scrollTo({ top: document.getElementById('result').offsetTop - 20, behavior: 'smooth' });
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const historyList = document.getElementById('historyList');
        if (history.length === 0) {
            historyList.innerHTML = "尚未有測驗紀錄。加油！";
            return;
        }
        historyList.innerHTML = history.slice().reverse().map((item, idx) => `
            <div class="history-item">
                <div style="font-size: 0.9em; color: #64748b;">${item.date}</div>
                <strong>第 ${history.length - idx} 次測驗結果</strong><br>
                得分：<span style="color: #047857; font-size: 1.4em;">${item.score}</span> / ${item.total}
                <details style="margin-top: 15px; border-top: 1px solid #f1f5f9; padding-top: 10px;">
                    <summary style="cursor: pointer; color: #3b82f6; font-size: 0.95em;">查看答錯細節...</summary>
                    <div style="margin-top: 12px; font-size: 0.9em; line-height: 1.8;">
                        ${item.mistakes.length > 0 ? item.mistakes.map(m => `
                            <div style="margin-bottom: 12px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px;">
                                <div style="font-weight: bold;">[原題] ${m.question}</div>
                                <span style="color: #ef4444;">你答：${m.user}</span> | <span style="color: #059669;">正確：${m.correct}</span>
                            </div>
                        `).join('') : "無錯題。"}
                    </div>
                </details>
            </div>
        `).join('');
    }

    function clearHistory() {
        if (confirm("確定要清除所有測驗紀錄嗎？(無法復原)")) {
            localStorage.removeItem(STORAGE_KEY);
            displayHistory();
        }
    }

    function createReviewItem(no, type, q, user, correct, ex) {
        return `
            <div class="wrong-item">
                <strong>[${type} 第 ${no} 題]</strong><br> ${q}
                <div class="user-ans-wrong">❌ 您的回答：${user}</div>
                <div class="correct-ans">✅ 正確答案：${correct}</div>
                <div class="explanation">📖 重點筆記：${ex}</div>
            </div>`;
    }

    window.onload = function() {
        init();
        displayHistory();
    };
</script>

</body>
</html>
