<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級測驗中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="theme-toggle">
    <button id="themeBtn" onclick="toggleTheme()"><span>🌙</span> 暗色模式</button>
</div>

<div class="container">
    <h1>📚 五年級測驗中心</h1>
    
    <div class="subjects-grid">
        <a href="science.html" class="subject-card science-card">
            <h2>🌠</h2>
            <h2>自然</h2>
            <p>探索科學世界</p>
        </a>
        
        <a href="english.html" class="subject-card english-card">
            <h2>🌍</h2>
            <h2>英文</h2>
            <p>學習英語知識</p>
        </a>
        
        <a href="math.html" class="subject-card math-card">
            <h2>🔢</h2>
            <h2>數學</h2>
            <p>挑戰數學問題</p>
        </a>
    </div>
</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeBtn');
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-theme', newTheme);
        btn.innerHTML = newTheme === 'dark' ? '<span>☀️</span> 亮色模式' : '<span>🌙</span> 暗色模式';
        localStorage.setItem('theme', newTheme);
    }

    window.addEventListener('DOMContentLoaded', function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeBtn');
        if (savedTheme === 'dark') btn.innerHTML = '<span>☀️</span> 亮色模式';
    });
</script>

</body>
</html>
